# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://192.168.4.51:3306/kellogg_uat?useSSL=false&requireSSL=false
spring.datasource.username=appuser
spring.datasource.password=Appuser*18
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Allow startup even if DB is temporarily unavailable
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=5000
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Anthropic Claude API
claude.api.key=${CLAUDE_API_KEY}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514

# CORS (allow React frontend)
app.cors.allowed-origins=http://localhost:3000

# JWT
jwt.secret=BotreeDmsKelloggAiDebugConsole2024SecretKeyForJwtTokenGeneration!@#
jwt.expiration=86400000

# Query safety
query.timeout=10
query.max-rows=200
query.max-length=10000

# RAG
rag.chunk-size=1000
rag.chunk-overlap=150
